services:
  python-ai:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    ports:
      - "8000:8000"
    volumes:
      - ./index:/app/index
      - ./images:/app/images

  go-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8080:8080"
    volumes:
      - ./index:/app/index
      - ./images:/app/images
    environment:
      - PYTHON_SERVICE_URL=http://python-ai:8000
      - METADATA_PATH=/app/index/metadata.json
      - SERVER_PORT=8080
    depends_on:
      - python-ai
